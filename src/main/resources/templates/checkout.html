<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>შეკვეთის გაფორმება</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light pb-5">

<!-- ნავიგაცია -->
<nav class="navbar navbar-expand-lg bg-white shadow-sm mb-5 border-bottom border-danger border-3">
  <div class="container py-2">
    <a class="navbar-brand fw-bolder text-dark" href="/">
      <span class="bg-danger text-white px-2 py-1 rounded me-1">GWG</span> TOOLS
    </a>
  </div>
</nav>

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">

      <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
        <div class="card-header bg-dark text-white p-4">
          <h4 class="mb-0 fw-bold"><i class="fas fa-box-open text-danger me-2"></i>შეკვეთის გაფორმება</h4>
        </div>

        <div class="card-body p-4 p-md-5">
          <div class="d-flex justify-content-between align-items-center mb-4 bg-light p-3 rounded border">
            <h6 class="m-0 text-muted fw-bold">გადასახდელი თანხა:</h6>
            <h3 class="m-0 text-success fw-bolder" th:text="${total} + ' ₾'">0 ₾</h3>
          </div>

          <form th:action="@{/checkout}" th:object="${order}" method="POST">

            <!-- საკონტაქტო ინფო -->
            <div class="mb-4">
              <h6 class="fw-bold mb-3 border-bottom pb-2">👤 საკონტაქტო ინფორმაცია</h6>

              <div class="mb-3">
                <label class="form-label small text-muted fw-semibold">სახელი და გვარი <span class="text-danger">*</span></label>
                <input type="text" th:field="*{customerName}" class="form-control" required placeholder="მაგ: გიორგი გიორგაძე">
              </div>

              <div class="mb-3">
                <label class="form-label small text-muted fw-semibold">ტელეფონის ნომერი <span class="text-danger">*</span></label>
                <input type="tel" th:field="*{customerPhone}" class="form-control" required placeholder="მაგ: 555 12 34 56">
              </div>

              <!-- 🌟 დამატებული ელ-ფოსტის ველი 🌟 -->
              <div class="mb-3">
                <label class="form-label small text-muted fw-semibold">ელ-ფოსტა (სურვილისამებრ)</label>
                <input type="email" th:field="*{customerEmail}" class="form-control" placeholder="მაგ: info@gwgtools.ge">
                <div class="form-text" style="font-size: 0.75rem;">შეკვეთის დეტალებს გამოგიგზავნით მეილზე.</div>
              </div>

              <div class="mb-3">
                <label class="form-label small text-muted fw-semibold">მისამართი (ქალაქი, ქუჩა) <span class="text-danger">*</span></label>
                <textarea th:field="*{customerAddress}" class="form-control" rows="2" required placeholder="თბილისი, პეკინის გამზ. 14"></textarea>
              </div>
            </div>

            <!-- ღილაკები / გადახდის მეთოდის არჩევა -->
            <h6 class="fw-bold mb-3 border-bottom pb-2 mt-4">💳 აირჩიეთ გადახდის მეთოდი</h6>

            <div class="d-grid gap-3 mt-3">

              <!-- ვარიანტი 1: ბარათით გადახდა (BOG) -->
              <button type="submit" name="paymentMethod" value="ONLINE" class="btn btn-warning btn-lg fw-bold d-flex justify-content-between align-items-center px-4" style="background-color: #f7931e; border-color: #f7931e; color: white;">
                <span><i class="fas fa-credit-card me-2"></i>ბარათით გადახდა (BOG)</span>
                <i class="fas fa-chevron-right"></i>
              </button>

              <!-- ვარიანტი 2: გადარიცხვა / ნაღდი ფული -->
              <button type="submit" name="paymentMethod" value="MANUAL" class="btn btn-outline-dark btn-lg fw-bold d-flex justify-content-between align-items-center px-4">
                <span><i class="fas fa-money-bill-wave me-2"></i>საბანკო გადარიცხვა</span>
                <i class="fas fa-check"></i>
              </button>

            </div>

          </form>

          <!-- საინფორმაციო ბლოკი ბანკებზე -->
          <div class="mt-5 text-center">
            <p class="small text-muted mb-2">მხარდაჭერილი ბანკები გადარიცხვისთვის:</p>
            <div class="d-flex justify-content-center gap-3">
              <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a9/TBC_Bank_logo.svg/200px-TBC_Bank_logo.svg.png" height="15" alt="TBC" style="opacity: 0.7;">
              <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/66/Bank_of_Georgia_logo.svg/200px-Bank_of_Georgia_logo.svg.png" height="15" alt="BOG" style="opacity: 0.7;">
            </div>
          </div>

        </div>
      </div>

    </div>
  </div>
</div>

</body>
</html>
