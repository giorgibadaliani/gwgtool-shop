<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>პროდუქტის დამატება/რედაქტირება</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <!-- Font Awesome აიქონებისთვის -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm mb-5">
                <div class="card-header bg-dark text-white">
                    <h4 class="mb-0">🛠️ პროდუქტის მართვა</h4>
                </div>
                <div class="card-body">

                    <form th:action="@{/products/save}" method="post" enctype="multipart/form-data">

                        <!-- ID რედაქტირებისთვის -->
                        <input type="hidden" name="id" th:value="${product.id}" />

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">დასახელება</label>
                                <input type="text" name="name" th:value="${product.name}" class="form-control" required placeholder="მაგ: Milwaukee M18 Drill">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">SKU კოდი</label>
                                <input type="text" name="sku" th:value="${product.sku}" class="form-control" placeholder="მაგ: 4933464516">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="form-label fw-bold">ფასი (₾)</label>
                                <input type="number" step="0.01" name="price" th:value="${product.price}" class="form-control" required>
                            </div>

                            <div class="col-md-4 mb-3">
                                <label class="form-label fw-bold">მარაგი (ცალი)</label>
                                <input type="number" name="stockQuantity" th:value="${product.stockQuantity}" class="form-control">
                            </div>

                            <div class="col-md-4 mb-3">
                                <label class="form-label fw-bold">კატეგორია</label>
                                <select name="category" class="form-select" required>
                                    <option value="">-- აირჩიე --</option>
                                    <option th:each="cat : ${T(ge.toolmasters.store.entity.Product.Category).values()}"
                                            th:value="${cat}"
                                            th:text="${cat}"
                                            th:selected="${product.category == cat}"></option>
                                </select>
                            </div>
                        </div>

                        <!-- 🌟 ტექნიკური მახასიათებლები და ფასდაკლება 🌟 -->
                        <div class="card border-danger mb-4">
                            <div class="card-header bg-danger text-white fw-bold">⚙️ ტექნიკური დეტალები და აქცია</div>
                            <div class="card-body row">

                                <div class="col-md-4 mb-3">
                                    <label class="form-label small fw-semibold">ძრავის ტიპი</label>
                                    <select name="isBrushless" class="form-select">
                                        <option value="">აირჩიეთ...</option>
                                        <option value="true" th:selected="${product.isBrushless == true}">უნახშირო (Brushless)</option>
                                        <option value="false" th:selected="${product.isBrushless == false}">ნახშირით (Brushed)</option>
                                    </select>
                                </div>

                                <div class="col-md-4 mb-3">
                                    <label class="form-label small fw-semibold">კვების წყარო</label>
                                    <select name="voltage" class="form-select">
                                        <option value="">აირჩიეთ...</option>
                                        <option value="M12" th:selected="${product.voltage == 'M12'}">M12</option>
                                        <option value="M18" th:selected="${product.voltage == 'M18'}">M18</option>
                                        <option value="230V" th:selected="${product.voltage == '230V'}">230V (დენზე)</option>
                                        <option value="MX FUEL" th:selected="${product.voltage == 'MX FUEL'}">MX FUEL</option>
                                    </select>
                                </div>

                                <div class="col-md-4 mb-3">
                                    <label class="form-label small fw-bold text-danger">ფასდაკლება (%)</label>
                                    <input type="number" name="discountPercentage" th:value="${product.discountPercentage}" class="form-control border-danger" min="0" max="99" placeholder="მაგ: 10">
                                </div>
                            </div>
                        </div>

                        <!-- 🌟 🚨 ახალი: გარანტიის Toggle 🚨 🌟 -->
                        <div class="mb-4 p-3 bg-light border border-success border-opacity-50 rounded-3 shadow-sm">
                            <div class="form-check form-switch fs-5 d-flex align-items-center mb-0">
                                <!-- აქ სახელი (name) და მნიშვნელობა (th:checked) გავუწერე, რომ Controller-მა სწორად წაიკითხოს -->
                                <input class="form-check-input me-3" type="checkbox" role="switch" id="hasWarranty" name="hasWarranty" th:checked="${product.hasWarranty}" style="width: 3rem; height: 1.5rem; cursor: pointer;">
                                <label class="form-check-label fw-bold text-success mb-0 mt-1" for="hasWarranty" style="cursor: pointer;">
                                    <i class="fas fa-shield-alt me-2"></i> ამ პროდუქტზე ვრცელდება გარანტია
                                </label>
                            </div>
                            <div class="form-text mt-2 text-muted" style="font-size: 0.85rem; margin-left: 4rem;">
                                ჩართეთ ეს ღილაკი, თუ ხელსაწყოს (მაგ: M12, M18, V230) მოყვება 1-წლიანი ოფიციალური გარანტია.
                            </div>
                        </div>

                        <!-- 🌟 🚨 კომპლექტაციის ბლოკი 🚨 🌟 -->
                        <div class="card border-info mb-4">
                            <div class="card-header bg-info text-white fw-bold">📦 კომპლექტაცია (რა მოყვება ყუთში)</div>
                            <div class="card-body row text-center">

                                <div class="col-md-4">
                                    <div class="form-check form-switch d-inline-block text-start">
                                        <input class="form-check-input" type="checkbox" id="hasBattery" name="hasBattery" th:checked="${product.hasBattery}">
                                        <label class="form-check-label fw-bold text-success" for="hasBattery">
                                            <i class="fas fa-battery-full"></i> მოყვება ელემენტი
                                        </label>
                                    </div>
                                </div>

                                <div class="col-md-4">
                                    <div class="form-check form-switch d-inline-block text-start">
                                        <input class="form-check-input" type="checkbox" id="hasCharger" name="hasCharger" th:checked="${product.hasCharger}">
                                        <label class="form-check-label fw-bold text-primary" for="hasCharger">
                                            <i class="fas fa-plug"></i> მოყვება დამტენი
                                        </label>
                                    </div>
                                </div>

                                <div class="col-md-4">
                                    <div class="form-check form-switch d-inline-block text-start">
                                        <input class="form-check-input" type="checkbox" id="hasCase" name="hasCase" th:checked="${product.hasCase}">
                                        <label class="form-check-label fw-bold text-warning" style="color: #d39e00 !important;" for="hasCase">
                                            <i class="fas fa-toolbox"></i> მოყვება ქეისი / ჩანთა
                                        </label>
                                    </div>
                                </div>

                            </div>
                        </div>

                        <!-- სურათების სექცია -->
                        <div class="card mb-3 border-secondary">
                            <div class="card-header bg-secondary text-white">
                                📷 პროდუქტის სურათი
                            </div>
                            <div class="card-body d-flex align-items-center gap-3">
                                <div th:if="${product.imageUrl != null and product.imageUrl != ''}" class="text-center">
                                    <img th:if="${#strings.startsWith(product.imageUrl, 'http')}"
                                         th:src="${product.imageUrl}" width="80" height="80" style="object-fit: cover;" class="border rounded">
                                    <img th:unless="${#strings.startsWith(product.imageUrl, 'http')}"
                                         th:src="@{'/uploads/' + ${product.imageUrl}}" width="80" height="80" style="object-fit: cover;" class="border rounded">
                                </div>
                                <div class="flex-grow-1">
                                    <div class="mb-2">
                                        <label class="form-label fw-bold small">URL ლინკი</label>
                                        <input type="text" name="imageUrl" th:value="${product.imageUrl}" class="form-control form-control-sm">
                                    </div>
                                    <div>
                                        <label class="form-label fw-bold small">ფაილის ატვირთვა</label>
                                        <input type="file" name="imageFile" class="form-control form-control-sm" accept="image/*">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">პროდუქტის მახასიათებლები (აღწერა)</label>
                            <textarea name="description" th:text="${product.description}" class="form-control" rows="5"></textarea>
                        </div>

                        <div class="d-flex gap-2 mt-4">
                            <button type="submit" class="btn btn-success w-50">💾 შენახვა</button>
                            <a href="/products" class="btn btn-outline-secondary w-50">გაუქმება</a>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
