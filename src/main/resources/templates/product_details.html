<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title th:text="${product.name}">დეტალები</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 sticky-top">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/">GWG-TOOLS 🛠️</a>
    <a href="/cart" class="btn btn-outline-warning position-relative">
      🛒 კალათა
      <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
            th:if="${cartCount != null && cartCount > 0}"
            th:text="${cartCount}">0</span>
    </a>
  </div>
</nav>

<div class="container my-5">
  <div class="row bg-white p-4 shadow-sm rounded">

    <!-- სურათი -->
    <div class="col-md-6 text-center mb-4">
      <img th:if="${product.imageUrl != null and #strings.startsWith(product.imageUrl, 'http')}"
           th:src="${product.imageUrl}" class="img-fluid rounded shadow-sm" style="max-height: 500px;" alt="Product Image">
      <img th:if="${product.imageUrl != null and !#strings.startsWith(product.imageUrl, 'http') and product.imageUrl != 'link' and product.imageUrl != ''}"
           th:src="@{'/uploads/' + ${product.imageUrl}}" class="img-fluid rounded shadow-sm" style="max-height: 500px;" alt="Product Image">
      <img th:if="${product.imageUrl == null or product.imageUrl == 'link' or product.imageUrl == ''}"
           th:src="@{/uploads/logo.png}" class="img-fluid rounded shadow-sm" style="max-height: 500px;" alt="Default Logo">
    </div>

    <!-- მარჯვენა სვეტი -->
    <div class="col-md-6">
      <h6 class="text-muted text-uppercase" th:text="'SKU: ' + ${product.sku}">SKU: 12345</h6>
      <h1 class="fw-bold mb-3" th:text="${product.name}">M18 Fuel Drill</h1>
      <h2 class="text-danger fw-bold mb-4" th:text="${product.price} + ' ₾'">500 ₾</h2>

      <div class="mb-4">
        <span class="badge bg-success fs-6"
              th:text="${product.stockQuantity} + ' ცალი მარაგშია'">5 ცალი მარაგშია</span>
      </div>

      <!-- პროდუქტის სპეციფიკაციები -->
      <div class="mt-3 mb-4"
           th:if="${product.description != null and product.description != ''}">
        <h5 class="fw-bold border-bottom pb-2">📋 მახასიათებლები</h5>
        <div class="p-3 bg-light rounded border"
             style="white-space: pre-wrap; font-size: 0.9rem;"
             th:text="${product.description}">
        </div>
      </div>

      <div class="d-grid gap-2 mt-4">
        <a th:href="@{/cart/add/{id}(id=${product.id})}" class="btn btn-primary btn-lg">კალათაში დამატება 🛒</a>
        <a href="/" class="btn btn-outline-secondary">უკან დაბრუნება</a>
      </div>
    </div>

  </div>
</div>

<footer class="text-center py-4 mt-5 text-muted border-top">
  <p>&copy; 2026 ToolMasters. ყველა უფლება დაცულია.</p>
</footer>

</body>
</html>
