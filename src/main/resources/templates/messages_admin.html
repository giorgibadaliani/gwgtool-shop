<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>შეტყობინებების მენეჯერი</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .message-row { transition: background-color 0.2s; }
    .message-row:hover { background-color: #f8f9fa; }
    /* წაუკითხავი მესიჯის სტილი */
    .unread { font-weight: bold; background-color: #f0f7ff; border-left: 4px solid #0d6efd; }
    /* წაკითხული მესიჯის სტილი */
    .read { color: #6c757d; border-left: 4px solid transparent; }
  </style>
</head>
<body class="bg-light">

<!-- ადმინის ნავიგაცია -->
<nav class="navbar navbar-expand-lg bg-dark navbar-dark shadow-sm mb-4">
  <div class="container-fluid px-4">
    <a class="navbar-brand fw-bold" href="/">
      <i class="fas fa-tools text-danger me-2"></i>GWG Admin
    </a>
    <div class="d-flex align-items-center gap-3">
      <a href="/products" class="btn btn-outline-light btn-sm"><i class="fas fa-box me-1"></i>პროდუქტები</a>
      <a href="/orders" class="btn btn-outline-light btn-sm"><i class="fas fa-clipboard-list me-1"></i>შეკვეთები</a>
      <span class="text-light fw-semibold border-start ps-3 ms-1"><i class="fas fa-envelope text-primary me-2"></i>შეტყობინებები</span>
    </div>
  </div>
</nav>

<div class="container-fluid px-4 pb-5">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="fw-bold text-dark"><i class="fas fa-inbox text-primary me-2"></i>შემოსული შეტყობინებები</h3>
  </div>

  <!-- თუ მესიჯები არ არის -->
  <div th:if="${messages.isEmpty()}" class="card border-0 shadow-sm text-center py-5">
    <div class="card-body text-muted">
      <i class="fas fa-envelope-open-text" style="font-size: 4rem; opacity: 0.3;"></i>
      <h5 class="mt-4 fw-bold">ინბოქსი ცარიელია</h5>
      <p>ჯერჯერობით ახალი შეტყობინებები არ შემოსულა.</p>
    </div>
  </div>

  <!-- მესიჯების სია -->
  <div th:if="${!messages.isEmpty()}" class="card shadow-sm border-0 rounded-4 overflow-hidden">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table mb-0 align-middle">
          <thead class="table-dark">
          <tr>
            <th class="ps-4 py-3" style="width: 20%;">გამომგზავნი</th>
            <th class="py-3" style="width: 50%;">შეტყობინება</th>
            <th class="py-3" style="width: 15%;">თარიღი</th>
            <th class="py-3 text-center pe-4" style="width: 15%;">მოქმედება</th>
          </tr>
          </thead>
          <tbody>
          <!-- Loop მესიჯებზე -->
          <tr th:each="msg : ${messages}" class="message-row border-bottom" th:classappend="${msg.read} ? 'read' : 'unread'">

            <!-- გამომგზავნი და კონტაქტი -->
            <td class="ps-4 py-3">
              <div th:text="${msg.senderName}" class="fw-bold text-dark mb-1">გიორგი გიორგაძე</div>
              <div class="small">
                <i class="fas fa-address-card text-muted me-1"></i>
                <span th:text="${msg.senderContact}">555123456</span>
              </div>
              <span th:if="${!msg.read}" class="badge bg-primary mt-2" style="font-size: 0.65rem;">ახალი</span>
            </td>

            <!-- მესიჯის ტექსტი -->
            <td class="py-3 pe-4">
              <div class="p-3 rounded-3" th:classappend="${msg.read} ? 'bg-light text-muted' : 'bg-white border text-dark'"
                   style="white-space: pre-wrap; font-size: 0.95rem;" th:text="${msg.messageContent}">
                გამარჯობა, მაინტერესებს მილუოკის M18 დრელზე...
              </div>
            </td>

            <!-- თარიღი -->
            <td class="py-3">
              <div class="small fw-semibold" th:text="${#temporals.format(msg.receivedAt, 'dd MMM, HH:mm')}">14 მარ, 15:30</div>
            </td>

            <!-- მოქმედების ღილაკები -->
            <td class="py-3 text-center pe-4">
              <div class="d-flex flex-column gap-2 justify-content-center align-items-center">

                <!-- წაკითხულად მონიშვნა (თუ წაუკითხავია) -->
                <form th:if="${!msg.read}" th:action="@{'/admin/messages/' + ${msg.id} + '/read'}" method="POST">
                  <button type="submit" class="btn btn-sm btn-outline-primary" style="width: 130px;">
                    <i class="fas fa-check me-1"></i> წაკითხულია
                  </button>
                </form>

                <!-- წაშლა -->
                <form th:action="@{'/admin/messages/' + ${msg.id} + '/delete'}" method="POST">
                  <button type="submit" class="btn btn-sm btn-outline-danger" style="width: 130px;" onclick="return confirm('ნამდვილად გსურთ ამ შეტყობინების წაშლა?');">
                    <i class="fas fa-trash-alt me-1"></i> წაშლა
                  </button>
                </form>
              </div>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
